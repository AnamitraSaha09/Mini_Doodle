spring:
  datasource:
    url: jdbc:h2:mem:doodle;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: doodle
    password: doodle
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
